services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tasks_api_app
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_TIMEZONE: Europe/Moscow
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: tasks
      DB_USERNAME: tasks
      DB_PASSWORD: secret
      CACHE_STORE: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_TASK_LIST_ENABLED: "true"

  nginx:
    image: nginx:1.27-alpine
    container_name: tasks_api_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    container_name: tasks_api_mysql
    environment:
      MYSQL_DATABASE: tasks
      MYSQL_USER: tasks
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tasks_api_redis
    ports:
      - "6379:6379"

volumes:
  mysql_data:
