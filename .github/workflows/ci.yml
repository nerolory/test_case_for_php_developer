name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: tasks_test
          MYSQL_USER: tasks
          MYSQL_PASSWORD: secret
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo_mysql, zip, bcmath, redis
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan migrate --force
        env:
          DB_HOST: 127.0.0.1
          DB_DATABASE: tasks_test
          DB_USERNAME: tasks
          DB_PASSWORD: secret
          CACHE_STORE: redis
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          CACHE_TASK_LIST_ENABLED: "true"

      - name: Pint
        run: vendor/bin/pint --test

      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=512M

      - name: Tests
        run: php artisan test
        env:
          CACHE_STORE: redis
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          CACHE_TASK_LIST_ENABLED: "true"
